services:
  postgres:
    image: postgres:16-alpine
    container_name: flowfi-postgres
    environment:
      POSTGRES_USER: flowfi
      POSTGRES_PASSWORD: flowfi_dev_password
      POSTGRES_DB: flowfi
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowfi -d flowfi"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowfi-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://flowfi:flowfi_dev_password@postgres:5432/flowfi
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      # Uncomment and set values for Soroban integration
      # SOROBAN_RPC_URL: https://rpc.testnet.stellar.org
      # STREAM_CONTRACT_ID: CB...YOUR_CONTRACT_ID...
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
