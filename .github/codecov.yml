coverage:
  status:
    project:
      backend:
        target: 60%
        flags:
          - backend
      contracts:
        target: 70%
        flags:
          - contracts
      frontend:
        target: auto
        flags:
          - frontend
    patch:
      default:
        target: 60%

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false
